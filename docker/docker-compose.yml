version: "3.8"

# ── Shared GPU + IPC config ───────────────────────────────────────────────────
x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
  shm_size: "64gb"
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  stdin_open: true
  tty: true

# ── Shared build context ──────────────────────────────────────────────────────
x-build: &build-base
  context: ..
  dockerfile: docker/Dockerfile

services:

  # ── GR00T-H ─────────────────────────────────────────────────────────────────

  # Deployment: source baked in, no mounts needed for code.
  groot-h:
    <<: *gpu
    build:
      <<: *build-base
      target: groot-h
    image: world-models:groot-h
    volumes:
      - ${WEIGHTS_DIR:-$HOME/models/GR00T-H}:/weights/GR00T-H:ro
      - ${DATASET_DIR:-/tmp/no_dataset}:/data:ro
      - ../outputs:/outputs
    working_dir: /workspace/groot_h

  # Development: deps only, source mounted live from the repo.
  # After starting: pip install -e /workspace/groot_h --no-deps
  groot-h-dev:
    <<: *gpu
    build:
      <<: *build-base
      target: groot-h-deps
    image: world-models:groot-h-dev
    volumes:
      - ../vla/GR00T-H:/workspace/groot_h   # live code mount
      - ${WEIGHTS_DIR:-$HOME/models/GR00T-H}:/weights/GR00T-H:ro
      - ${DATASET_DIR:-/tmp/no_dataset}:/data:ro
      - ../outputs:/outputs
    working_dir: /workspace/groot_h

  # ── V-JEPA 2 ────────────────────────────────────────────────────────────────

  # Deployment: source baked in.
  vjepa2:
    <<: *gpu
    build:
      <<: *build-base
      target: vjepa2
    image: world-models:vjepa2
    volumes:
      - ${DATASET_DIR:-/tmp/no_dataset}:/data:ro
      - ../outputs:/outputs
    working_dir: /workspace/vjepa2

  # Development: deps only, source mounted live from the repo.
  # After starting: pip install -e /workspace/vjepa2 --no-deps
  vjepa2-dev:
    <<: *gpu
    build:
      <<: *build-base
      target: vjepa2-deps
    image: world-models:vjepa2-dev
    volumes:
      - ../latent_predictive/vjepa2:/workspace/vjepa2   # live code mount
      - ${DATASET_DIR:-/tmp/no_dataset}:/data:ro
      - ../outputs:/outputs
    working_dir: /workspace/vjepa2
